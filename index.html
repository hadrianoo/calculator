<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="display">
        <p class="text">0</p>
    </div>
    <div class="container">
        <button class="empty"></button>
        <button class="empty"></button>
        <button class="empty"></button>
        <button class="operator">/</button>
        <button class="digit">7</button>
        <button class="digit">8</button>
        <button class="digit">9</button>
        <button class="operator">*</button>
        <button class="digit">4</button>
        <button class="digit">6</button>
        <button class="digit">5</button>
        <button class="operator">-</button>
        <button class="digit">1</button>
        <button class="digit">2</button>
        <button class="digit">3</button>
        <button class="operator">+</button>
        <button class="empty"></button>
        <button class="digit">0</button>
        <button class="clear">CE</button>
        <button class="equal">=</button>
    </div>

    <script>
        const container = document.querySelector(".container");
        const display = document.querySelector("p");

        function add(firstNum, secondNum) {
            return firstNum + secondNum;
        };
        function subtract(firstNum, secondNum) {
            return firstNum - secondNum;
        };
        function multiply(firstNum, secondNum) {
            return firstNum * secondNum;
        };
        function divide(firstNum, secondNum) {
            return Number((firstNum / secondNum).toFixed(4));
        };

        let firstNumber = 0;
        let secondNumber = 0;
        let operator = "";
        let chosenFirstNumber = false;
        let chosenSecondNumber = false;

        function clear() {

            firstNumber = 0;
            secondNumber = 0;
            operator = "";
            chosenFirstNumber = false;
            chosenSecondNumber = false;
        };

        function operate(opr, firstNum, secondNum) {

            switch (opr) {
                case "+":
                    display.textContent = add(firstNum, secondNum);
                    break;
                case "-":
                    display.textContent = subtract(firstNum, secondNum);
                    break;
                case "*":
                    display.textContent = multiply(firstNum, secondNum);
                    break;
                case "/":
                    display.textContent = divide(firstNum, secondNum);
                    break;
            };
        };
        function update() {

            container.addEventListener('click', (event) => {
                let target = event.target

                switch (target.className) {
                    case "digit": {
                        if (chosenFirstNumber === false) {
                            firstNumber += event.target.textContent;
                            display.textContent = Number(firstNumber);
                        } else if (chosenSecondNumber === false) {
                            secondNumber += event.target.textContent;
                            display.textContent = Number(secondNumber);
                        }
                        break;
                    }
                    case "operator": {
                        operator = event.target.textContent;
                        chosenFirstNumber = true;
                        break;
                    }

                    case "equal": {
                        if (chosenFirstNumber === true) {
                            operate(operator, Number(firstNumber), Number(secondNumber));
                            chosenFirstNumber = false;
                            clear();
                        }
                        break;
                    }
                    case "clear": {
                        display.textContent = "0";
                        clear();
                        break;
                    }
                }

                // if (event.target.className === "digit" && chosenFirstNumber === false) {
                //     firstNumber += event.target.textContent;
                //     display.textContent = Number(firstNumber);

                // }
                // if (event.target.className === "operator") {
                //     operator = event.target.textContent;
                //     chosenFirstNumber = true;
                // }
                // if (event.target.className === "digit" && chosenFirstNumber === true) {
                //     secondNumber += event.target.textContent;
                //     display.textContent = Number(secondNumber);
                // }



                // if (event.target.className === "equal" && chosenFirstNumber === true) {
                //     operate(operator, Number(firstNumber), Number(secondNumber));
                //     chosenFirstNumber = false;
                //     clear();
                // }
                // if (event.target.className === "clear") {
                //     clear();
                //     display.textContent = "0";
                // }

                console.log(firstNumber, operator, secondNumber)

            })
        };
        update()
    </script>

</body>

</html>
