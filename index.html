<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="display">
        <p class="text">0</p>
    </div>
    <div class="container">
        <button class="empty"></button>
        <button class="empty"></button>
        <button class="back">DEL</button>
        <button class="operator">/</button>
        <button class="digit">7</button>
        <button class="digit">8</button>
        <button class="digit">9</button>
        <button class="operator">*</button>
        <button class="digit">4</button>
        <button class="digit">6</button>
        <button class="digit">5</button>
        <button class="operator">-</button>
        <button class="digit">1</button>
        <button class="digit">2</button>
        <button class="digit">3</button>
        <button class="operator">+</button>
        <button class="dot">.</button>
        <button class="digit">0</button>
        <button class="clear">CE</button>
        <button class="equal">=</button>
    </div>

    <script>
        const container = document.querySelector(".container");
        const display = document.querySelector("p");

        function add(firstNum, secondNum) {
            return Number((firstNum + secondNum).toFixed(4));
        };
        function subtract(firstNum, secondNum) {
            return Number((firstNum - secondNum).toFixed(4));
        };
        function multiply(firstNum, secondNum) {
            return Number((firstNum * secondNum).toFixed(4));
        };
        function divide(firstNum, secondNum) {
            if (secondNum === Number(0)) return "Not this time";
            return Number((firstNum / secondNum).toFixed(4));
        };

        let firstNumber = "";
        let secondNumber = "";
        let operator = "";
        let isFirstNumChosen = false;
        let isOperatorChosen = false;

        function clear() {

            firstNumber = "";
            secondNumber = "";
            operator = "";
            isFirstNumChosen = false;
            isOperatorChosen = false;
        };

        function operate(opr, firstNum, secondNum) {

            switch (opr) {
                case "+":
                    display.textContent = add(firstNum, secondNum);
                    break;
                case "-":
                    display.textContent = subtract(firstNum, secondNum);
                    break;
                case "*":
                    display.textContent = multiply(firstNum, secondNum);
                    break;
                case "/":
                    display.textContent = divide(firstNum, secondNum);
                    break;
            };
        };

        function update() {

            container.addEventListener('click', (event) => {
                let button = event.target;

                switch (button.className) {
                    case "digit": {
                        if (!isFirstNumChosen) {
                            firstNumber += button.textContent;
                            display.textContent = firstNumber;
                        } else {
                            secondNumber += button.textContent;
                            display.textContent = secondNumber;
                            isOperatorChosen = false;
                        }
                        break;
                    }
                    case "operator": {
                        if (isFirstNumChosen && !isOperatorChosen) {
                            operate(operator, Number(firstNumber), Number(secondNumber));
                            operator = button.textContent;
                            firstNumber = display.textContent;
                            secondNumber = "";
                        } else {
                            operator = button.textContent;
                            isOperatorChosen = true;
                            isFirstNumChosen = true;
                        }
                        break;
                    }
                    case "equal": {
                        if (isFirstNumChosen && !isOperatorChosen) {
                            operate(operator, Number(firstNumber), Number(secondNumber));
                            firstNumber = display.textContent;
                            secondNumber = "";
                            clear();
                        }
                        break;
                    }
                    case "dot": {
                        if (!firstNumber.includes(".") && !isFirstNumChosen && firstNumber.length !== 0) {
                            firstNumber += button.textContent;
                            display.textContent = firstNumber;
                        }
                        if (!secondNumber.includes(".") && secondNumber.length !== 0) {
                            secondNumber += button.textContent;
                            display.textContent = secondNumber;
                        }
                        break;
                    }
                    case "back": {
                        if (!isFirstNumChosen && firstNumber.length !== 0) {
                            console.log(firstNumber)
                            firstNumber = firstNumber.slice(0, -1);
                            console.log(firstNumber)
                            display.textContent = firstNumber;
                        } else if (secondNumber.length !== 0) {
                            secondNumber = secondNumber.slice(0, -1);
                            display.textContent = secondNumber;
                        }
                        break;
                    }
                    case "clear": {
                        display.textContent = "0";
                        clear();
                        break;
                    }
                }
            })
        };
        update()
    </script>

</body>

</html>
