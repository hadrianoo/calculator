<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="display">
        <p class="text">0</p>
    </div>
    <div id="container">
        <button id="empty"></button>
        <button id="empty"></button>
        <button id="empty"></button>
        <button id="div" class="operator">/</button>
        <button id="7" class="digit">7</button>
        <button id="8" class="digit">8</button>
        <button id="9" class="digit">9</button>
        <button id="multi" class="operator">*</button>
        <button id="4" class="digit">4</button>
        <button id="5" class="digit">5</button>
        <button id="6" class="digit">6</button>
        <button id="sub" class="operator">-</button>
        <button id="1" class="digit">1</button>
        <button id="2" class="digit">2</button>
        <button id="3" class="digit">3</button>
        <button id="add" class="operator">+</button>
        <button id="empty"></button>
        <button id="0" class="digit">0</button>
        <button id="clear">CE</button>
        <button id="equal" class="operator">=</button>
    </div>

    <script>
        function add(firstNum, secondNum) {
            return firstNum + secondNum;
        };
        function subtract(firstNum, secondNum) {
            return firstNum - secondNum;
        };
        function multiply(firstNum, secondNum) {
            return firstNum * secondNum;
        };
        function divide(firstNum, secondNum) {
            return firstNum / secondNum;
        };

        let firstNumber;
        let secondNumber;
        let operator;

        function operate(opr, firstNum, secondNum) {

            switch (opr) {
                case "+":
                    add(firstNum, secondNum);
                    break;
                case "-":
                    subtract(firstNum, secondNum);
                    break;
                case "*":
                    multiply(firstNum, secondNum);
                    break;
                case "/":
                    divide(firstNum, secondNum);
                    break;
            };
        };
        function update() {
            const container = document.querySelector("#container");
            const display = document.querySelector("p");

            container.addEventListener('click', (event) => {
                if (event.target.className === "digit") {
                    firstNumber = event.target.id;
                    display.textContent = event.target.textContent;
                    console.log(event.target.textContent)

                }
            })
        };
        update()
    </script>

</body>

</html>
